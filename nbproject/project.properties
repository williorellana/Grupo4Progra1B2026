dist.dir=dist
dist.jar=${dist.dir}/ZooAurora.jar
dist.jlink.dir=${dist.dir}/jlink
dist.jlink.output=${dist.jlink.dir}/ZooAurora
endorsed.classpath=
excludes=
includes=**
jar.compress=false
javac.classpath=
javac.deprecation=false
javac.external.vm=false
javac.modulepath=
javac.processormodulepath=
